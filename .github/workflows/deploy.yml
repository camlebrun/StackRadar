name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-email-digest
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      email_function: ${{ steps.filter.outputs.email_function }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            email_function:
              - 'functions/email/**'

  deploy-email-function:
    name: Deploy Cloud Function (email-digest)
    needs: changes
    if: needs.changes.outputs.email_function == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy email-digest \
            --gen2 \
            --runtime=python312 \
            --region=europe-west9 \
            --source=functions/email \
            --entry-point=send_email \
            --trigger-http \
            --service-account=git-release-sa@git-release-496817.iam.gserviceaccount.com \
            --memory=512MB \
            --timeout=120s \
            --project=git-release-496817
